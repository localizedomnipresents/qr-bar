<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QR Code Generator</title>
<style>
  :root{
    --text:#2C2C2B; --muted:#7D7A75; --canvas:#FFFFFF; --soft:#F9F8F7;
    --surface:#F0EFED; --border:#E6E5E3; --accent:#2783DE; --accent-soft:#E5F2FC;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --text:#FFFFFF; --muted:rgba(255,255,255,.65); --canvas:#191919;
      --soft:#202020; --surface:#202020; --border:rgba(255,255,255,.20);
      --accent:#5E9FE8; --accent-soft:rgba(94,159,232,.12);
    }
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--canvas); color:var(--text);
    display:flex; align-items:flex-start; justify-content:center;
    padding:24px 16px; line-height:1.5;
  }
  .card{
    width:100%; max-width:760px;
    display:grid; grid-template-columns:1fr minmax(230px,300px); gap:28px; align-items:center;
  }
  @media (max-width:520px){ .card{grid-template-columns:1fr; align-items:stretch;} }
  h1{font-size:20px; margin:0 0 4px; font-weight:600; letter-spacing:-.01em;}
  p.sub{margin:0 0 20px; color:var(--muted); font-size:14px;}
  label{display:block; font-size:13px; font-weight:600; margin:0 0 8px; color:var(--text);}
  .row{display:flex; gap:8px;}
  input[type=text]{
    font-size:16px; color:var(--text);
    background:var(--soft); border:1px solid var(--border); border-radius:8px;
    padding:11px 12px; outline:none; font-family:inherit;
  }
  #url{flex:1; min-width:0;}
  input[type=text]:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft);}
  button{
    font-family:inherit; font-size:15px; font-weight:600; cursor:pointer;
    border-radius:8px; border:1px solid transparent; padding:11px 16px; min-height:44px;
    white-space:nowrap;
  }
  .primary{background:var(--accent); color:#fff;}
  .primary:hover{filter:brightness(1.05);}
  .ghost{background:var(--soft); color:var(--text); border-color:var(--border); width:100%; margin-top:20px;}
  .ghost:hover{background:var(--surface);}
  .ghost:disabled{opacity:.45; cursor:not-allowed;}
  #dlsvg{margin-top:8px;}
  .iconbtn{background:var(--soft); color:var(--muted); border:1px solid var(--border); width:44px; height:44px; min-height:44px; padding:0; flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:16px; line-height:1;}
  .iconbtn:hover{background:var(--surface); color:var(--text);}
  .err{color:#E56458; font-size:13px; margin-top:10px; min-height:18px;}
  @media (prefers-color-scheme: dark){ .err{color:#E97366;} }
  .field{margin-top:18px;}
  .seg{display:inline-flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--soft);}
  .seg button{background:transparent; border:none; border-radius:0; padding:9px 16px; min-height:42px; color:var(--muted); font-weight:600; font-size:14px;}
  .seg button+button{border-left:1px solid var(--border);}
  .seg button.active{background:var(--accent); color:#fff;}
  .colorrow{display:flex; gap:8px; align-items:center;}
  input[type=color]{width:44px; height:44px; padding:2px; border:1px solid var(--border); border-radius:8px; background:var(--soft); cursor:pointer;}
  input#colorHex, input#bgHex{width:130px; flex:0 0 auto; font-size:15px; text-transform:uppercase;
    background:var(--soft); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); outline:none; font-family:inherit;}
  input#colorHex:focus, input#bgHex:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft);}
  input[type=color]:disabled, input#bgHex:disabled{opacity:.45; cursor:not-allowed;}
  input#label{width:100%; font-size:15px; background:var(--soft); border:1px solid var(--border);
    border-radius:8px; padding:10px 12px; color:var(--text); outline:none; font-family:inherit;}
  input#label:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft);}
  .hint2{font-size:12px; color:var(--muted); margin-top:8px; min-height:16px;}
  .warn{color:#D5803B;}
  @media (prefers-color-scheme: dark){ .warn{color:#DE9255;} }
  .checkfield{display:flex; align-items:center; gap:10px;}
  .checkfield label{margin:0; font-weight:500; font-size:14px; cursor:pointer;}
  input[type=checkbox]{width:18px; height:18px; accent-color:var(--accent); cursor:pointer; flex:0 0 auto;}
  .preview{display:flex; flex-direction:column; align-items:center; align-self:center;}
  .frame{
    width:100%; max-width:300px;
    border:1px solid var(--border); border-radius:12px; background:#fff;
    display:flex; align-items:center; justify-content:center; overflow:hidden; padding:12px;
  }
  .frame.transparent{
    background-color:#fff;
    background-image:linear-gradient(45deg,#e6e5e3 25%,transparent 25%),linear-gradient(-45deg,#e6e5e3 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#e6e5e3 75%),linear-gradient(-45deg,transparent 75%,#e6e5e3 75%);
    background-size:16px 16px; background-position:0 0,0 8px,8px -8px,-8px 0;
  }
  canvas{display:block; width:100%; height:auto; image-rendering:pixelated;}
  .hint{font-size:12px; color:var(--muted); margin-top:10px; text-align:center;}
  .bc-only{display:none;}
  body.barcode .qr-only{display:none;}
  body.barcode .bc-only{display:block;}
</style>
</head>
<body>
  <div class="card">
    <div class="controls">
      <h1>QR Code Generator</h1>
      <p class="sub">Generate a QR code or barcode, then customize color, background and label.</p>
      <label for="url" id="urlLabel">URL or text</label>
      <div class="row">
        <input id="url" type="text" placeholder="https://example.com" autocomplete="off" spellcheck="false" />
        <button class="primary" id="gen">Generate</button>
        <button class="iconbtn" id="clear" type="button" title="Clear all" aria-label="Clear all">✕</button>
      </div>
      <div class="err" id="err"></div>
      <div class="hint2 bc-only" id="bcHint">Code 128 barcode: letters, digits and common symbols only.</div>

      <div class="field">
        <label>Type</label>
        <div class="seg" id="modeSeg">
          <button type="button" data-mode="qr" class="active">QR code</button>
          <button type="button" data-mode="barcode">Barcode</button>
        </div>
      </div>

      <div class="field qr-only">
        <label>Size</label>
        <div class="seg" id="sizeSeg">
          <button type="button" data-size="300">300 px</button>
          <button type="button" data-size="500" class="active">500 px</button>
          <button type="button" data-size="1000">1000 px</button>
        </div>
      </div>

      <div class="field">
        <label for="color">Color</label>
        <div class="colorrow">
          <input type="color" id="color" value="#000000" />
          <input type="text" id="colorHex" value="#000000" spellcheck="false" maxlength="7" aria-label="Hex color" />
        </div>
        <div class="hint2" id="colorHint">Dark codes on light backgrounds scan most reliably.</div>
      </div>

      <div class="field">
        <label for="bgColor">Background color</label>
        <div class="colorrow">
          <input type="color" id="bgColor" value="#FFFFFF" />
          <input type="text" id="bgHex" value="#FFFFFF" spellcheck="false" maxlength="7" aria-label="Hex background color" />
        </div>
        <div class="hint2">Ignored when the background is transparent.</div>
      </div>

      <div class="field qr-only">
        <label for="label">Label text (optional)</label>
        <input type="text" id="label" placeholder="e.g. Scan to visit our site" autocomplete="off" />
      </div>

      <div class="field checkfield">
        <input type="checkbox" id="transparent" />
        <label for="transparent">Transparent background</label>
      </div>

      <button class="ghost" id="dl" disabled>Download PNG</button>
      <button class="ghost" id="dlsvg" disabled>Download SVG</button>
    </div>
    <div class="preview">
      <div class="frame" id="frame"><canvas id="cv" width="500" height="500"></canvas></div>
      <div class="hint" id="dim">500 × 500 px</div>
    </div>
  </div>
<script>
"use strict";
(function(){
  /* ---------- Galois field GF(256) ---------- */
  var EXP=new Array(512), LOG=new Array(256);
  (function(){ var x=1; for(var i=0;i<255;i++){ EXP[i]=x; LOG[x]=i; x<<=1; if(x&0x100) x^=0x11d; } for(var i=255;i<512;i++) EXP[i]=EXP[i-255]; })();
  function gmul(a,b){ if(a===0||b===0) return 0; return EXP[LOG[a]+LOG[b]]; }
  function rsGen(n){ var g=[1]; for(var i=0;i<n;i++){ var ng=new Array(g.length+1); for(var k=0;k<ng.length;k++) ng[k]=0; for(var j=0;j<g.length;j++){ ng[j]^=g[j]; ng[j+1]^=gmul(g[j],EXP[i]); } g=ng; } return g; }
  function rsEncode(data,n){ var gen=rsGen(n); var res=data.slice(); for(var i=0;i<n;i++) res.push(0); for(var i=0;i<data.length;i++){ var c=res[i]; if(c!==0){ for(var j=0;j<gen.length;j++) res[i+j]^=gmul(gen[j],c); } } return res.slice(data.length); }

  /* ---------- EC table (level M, versions 1-10) ---------- */
  var EC={
    1:{ec:10,g:[[1,16]]}, 2:{ec:16,g:[[1,28]]}, 3:{ec:26,g:[[1,44]]},
    4:{ec:18,g:[[2,32]]}, 5:{ec:24,g:[[2,43]]}, 6:{ec:16,g:[[4,27]]},
    7:{ec:18,g:[[4,31]]}, 8:{ec:22,g:[[2,38],[2,39]]},
    9:{ec:22,g:[[3,36],[2,37]]}, 10:{ec:26,g:[[4,43],[1,44]]}
  };
  var ALIGN={1:[],2:[6,18],3:[6,22],4:[6,26],5:[6,30],6:[6,34],7:[6,22,38],8:[6,24,42],9:[6,26,46],10:[6,28,50]};
  function dataCw(v){ var t=0; EC[v].g.forEach(function(gr){ t+=gr[0]*gr[1]; }); return t; }

  function utf8(str){ var out=[]; for(var i=0;i<str.length;i++){ var c=str.charCodeAt(i); if(c<0x80) out.push(c); else if(c<0x800){ out.push(0xC0|(c>>6),0x80|(c&0x3f)); } else if(c>=0xD800&&c<=0xDBFF){ var c2=str.charCodeAt(++i); var cp=0x10000+((c&0x3ff)<<10)+(c2&0x3ff); out.push(0xF0|(cp>>18),0x80|((cp>>12)&0x3f),0x80|((cp>>6)&0x3f),0x80|(cp&0x3f)); } else { out.push(0xE0|(c>>12),0x80|((c>>6)&0x3f),0x80|(c&0x3f)); } } return out; }

  function chooseVersion(len){ for(var v=1;v<=10;v++){ var cc=v<=9?8:16; var avail=dataCw(v)*8; var need=4+cc+len*8; if(need<=avail) return v; } return -1; }

  function encode(bytes,v){
    var total=dataCw(v); var bits=[];
    function push(val,ln){ for(var i=ln-1;i>=0;i--) bits.push((val>>i)&1); }
    push(4,4); push(bytes.length, v<=9?8:16);
    for(var i=0;i<bytes.length;i++) push(bytes[i],8);
    var cap=total*8; var term=Math.min(4,cap-bits.length);
    for(var i=0;i<term;i++) bits.push(0);
    while(bits.length%8!==0) bits.push(0);
    var pad=[0xEC,0x11], pi=0;
    while(bits.length<cap){ push(pad[pi],8); pi^=1; }
    var cw=[]; for(var i=0;i<bits.length;i+=8){ var b=0; for(var j=0;j<8;j++) b=(b<<1)|bits[i+j]; cw.push(b); }
    return cw;
  }

  function interleave(cw,v){
    var info=EC[v], ecLen=info.ec, blocks=[], idx=0;
    info.g.forEach(function(gr){ for(var b=0;b<gr[0];b++){ var d=cw.slice(idx,idx+gr[1]); idx+=gr[1]; blocks.push({d:d, e:rsEncode(d,ecLen)}); } });
    var maxD=0; blocks.forEach(function(bl){ if(bl.d.length>maxD) maxD=bl.d.length; });
    var out=[];
    for(var i=0;i<maxD;i++) blocks.forEach(function(bl){ if(i<bl.d.length) out.push(bl.d[i]); });
    for(var i=0;i<ecLen;i++) blocks.forEach(function(bl){ out.push(bl.e[i]); });
    return out;
  }

  /* ---------- Matrix ---------- */
  function buildMatrix(v){ var size=17+4*v; var m=[], f=[]; for(var r=0;r<size;r++){ m.push(new Array(size).fill(0)); f.push(new Array(size).fill(false)); } return {size:size,m:m,f:f}; }
  function setF(g,r,c,val){ g.m[r][c]=val?1:0; g.f[r][c]=true; }
  function finder(g,r,c){ for(var i=-1;i<=7;i++) for(var j=-1;j<=7;j++){ var rr=r+i, cc=c+j; if(rr<0||cc<0||rr>=g.size||cc>=g.size) continue; var dark=(i>=0&&i<=6&&(j===0||j===6))||(j>=0&&j<=6&&(i===0||i===6))||(i>=2&&i<=4&&j>=2&&j<=4); setF(g,rr,cc,dark); } }
  function alignPat(g,r,c){ for(var i=-2;i<=2;i++) for(var j=-2;j<=2;j++){ var dark=Math.max(Math.abs(i),Math.abs(j))!==1; setF(g,r+i,c+j,dark); } }

  function place(g,v,data){
    var size=g.size;
    finder(g,0,0); finder(g,0,size-7); finder(g,size-7,0);
    for(var i=8;i<size-8;i++){ var b=(i%2===0)?1:0; setF(g,6,i,b); setF(g,i,6,b); }
    var ap=ALIGN[v];
    for(var a=0;a<ap.length;a++) for(var b2=0;b2<ap.length;b2++){ var r=ap[a], c=ap[b2]; if((r<=8&&c<=8)||(r<=8&&c>=size-9)||(r>=size-9&&c<=8)) continue; alignPat(g,r,c); }
    setF(g,size-8,8,1);
    for(var i=0;i<=8;i++){ if(!g.f[8][i]) setF(g,8,i,0); if(!g.f[i][8]) setF(g,i,8,0); }
    for(var i=0;i<8;i++){ if(!g.f[8][size-1-i]) setF(g,8,size-1-i,0); if(!g.f[size-1-i][8]) setF(g,size-1-i,8,0); }
    if(v>=7){ for(var i=0;i<18;i++){ var a2=size-11+i%3, b3=Math.floor(i/3); setF(g,b3,a2,0); setF(g,a2,b3,0); } }
    var idx=0, len=data.length*8;
    for(var right=size-1;right>=1;right-=2){ if(right===6) right=5; for(var vert=0;vert<size;vert++){ for(var j=0;j<2;j++){ var col=right-j; var up=((right+1)&2)===0; var row=up?(size-1-vert):vert; if(!g.f[row][col]){ var bit=0; if(idx<len){ bit=(data[idx>>3]>>(7-(idx&7)))&1; idx++; } g.m[row][col]=bit; } } } }
  }

  function applyMask(g,mask){ var size=g.size; for(var y=0;y<size;y++) for(var x=0;x<size;x++){ if(g.f[y][x]) continue; var inv=false; switch(mask){ case 0: inv=(x+y)%2===0; break; case 1: inv=y%2===0; break; case 2: inv=x%3===0; break; case 3: inv=(x+y)%3===0; break; case 4: inv=(Math.floor(x/3)+Math.floor(y/2))%2===0; break; case 5: inv=((x*y)%2)+((x*y)%3)===0; break; case 6: inv=(((x*y)%2)+((x*y)%3))%2===0; break; case 7: inv=(((x+y)%2)+((x*y)%3))%2===0; break; } if(inv) g.m[y][x]^=1; } }

  function fmtBits(mask){ var data=(0<<3)|mask; var rem=data; for(var i=0;i<10;i++) rem=(rem<<1)^(((rem>>9)&1)*0x537); return ((data<<10)|rem)^0x5412; }
  function drawFormat(g,mask){ var size=g.size; var bits=fmtBits(mask); function gb(i){ return (bits>>i)&1; }
    for(var i=0;i<=5;i++) setF(g,i,8,gb(i));
    setF(g,7,8,gb(6)); setF(g,8,8,gb(7)); setF(g,8,7,gb(8));
    for(var i=9;i<15;i++) setF(g,8,14-i,gb(i));
    for(var i=0;i<8;i++) setF(g,8,size-1-i,gb(i));
    for(var i=8;i<15;i++) setF(g,size-15+i,8,gb(i));
    setF(g,size-8,8,1);
  }
  function drawVersion(g,v){ if(v<7) return; var size=g.size; var rem=v; for(var i=0;i<12;i++) rem=(rem<<1)^(((rem>>11)&1)*0x1F25); var bits=(v<<12)|rem; for(var i=0;i<18;i++){ var bit=(bits>>i)&1; var a=size-11+i%3, b=Math.floor(i/3); setF(g,b,a,bit); setF(g,a,b,bit); } }

  /* ---------- penalty ---------- */
  var N1=3,N2=3,N3=40,N4=10;
  function addHist(run,hist,size){ if(hist[0]===0) run+=size; hist.pop(); hist.unshift(run); }
  function countPat(hist){ var n=hist[1]; var core=n>0&&hist[2]===n&&hist[3]===n*3&&hist[4]===n&&hist[5]===n; return (core&&hist[0]>=n*4&&hist[6]>=n?1:0)+(core&&hist[6]>=n*4&&hist[0]>=n?1:0); }
  function termCount(color,run,hist,size){ if(color){ addHist(run,hist,size); run=0; } run+=size; addHist(run,hist,size); return countPat(hist); }
  function penalty(g){ var size=g.size,m=g.m,res=0;
    for(var y=0;y<size;y++){ var rc=0,rx=0,h=[0,0,0,0,0,0,0]; for(var x=0;x<size;x++){ if(m[y][x]===rc){ rx++; if(rx===5) res+=N1; else if(rx>5) res++; } else { addHist(rx,h,size); if(rc===0) res+=countPat(h)*N3; rc=m[y][x]; rx=1; } } res+=termCount(rc,rx,h,size)*N3; }
    for(var x=0;x<size;x++){ var rc=0,rx=0,h=[0,0,0,0,0,0,0]; for(var y=0;y<size;y++){ if(m[y][x]===rc){ rx++; if(rx===5) res+=N1; else if(rx>5) res++; } else { addHist(rx,h,size); if(rc===0) res+=countPat(h)*N3; rc=m[y][x]; rx=1; } } res+=termCount(rc,rx,h,size)*N3; }
    for(var y=0;y<size-1;y++) for(var x=0;x<size-1;x++){ var c=m[y][x]; if(c===m[y][x+1]&&c===m[y+1][x]&&c===m[y+1][x+1]) res+=N2; }
    var dark=0; for(var y=0;y<size;y++) for(var x=0;x<size;x++) dark+=m[y][x]; var total=size*size; var k=Math.ceil(Math.abs(dark*20-total*10)/total)-1; res+=k*N4; return res;
  }

  function generate(text){
    var bytes=utf8(text); var v=chooseVersion(bytes.length);
    if(v<0) throw new Error("Text is too long for this generator (max ~213 characters).");
    var cw=encode(bytes,v); var data=interleave(cw,v);
    var best=null, bestScore=Infinity;
    for(var mask=0;mask<8;mask++){ var g=buildMatrix(v); place(g,v,data); applyMask(g,mask); drawFormat(g,mask); drawVersion(g,v); var s=penalty(g); if(s<bestScore){ bestScore=s; best=g; } }
    return best;
  }

  /* ---------- UI + render ---------- */
  var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  var urlEl=document.getElementById('url'), errEl=document.getElementById('err'), dlEl=document.getElementById('dl');
  var dimEl=document.getElementById('dim'), colorEl=document.getElementById('color'), colorHex=document.getElementById('colorHex');
  var colorHint=document.getElementById('colorHint'), sizeSeg=document.getElementById('sizeSeg');
  var labelEl=document.getElementById('label'), transparentEl=document.getElementById('transparent'), frameEl=document.getElementById('frame');
  var bgColorEl=document.getElementById('bgColor'), bgHex=document.getElementById('bgHex');
  var svgEl=document.getElementById('dlsvg'), clearEl=document.getElementById('clear');
  var modeSeg=document.getElementById('modeSeg'), urlLabel=document.getElementById('urlLabel');
  var FONT='-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif';
  var QUIET=4, SIZE=500, FG='#000000', BG='#FFFFFF', lastMatrix=null;
  var MODE='qr', lastBarcode=null;
  var BMODW=3, BHEIGHT=170, BTEXT=54, BQUIET=10;   // barcode: module width, bar height, caption band, quiet-zone modules
  var BAND={300:60,500:100,1000:200};   // label band height per size -> 300x360, 500x600, 1000x1200
  // Vertical offset (as a fraction of font size) between a text anchor line and the
  // alphabetic baseline. Used so canvas and SVG place text identically without relying
  // on SVG dominant-baseline support, which some non-browser renderers ignore.
  // TOP_RATIO: distance from the text's top edge down to the baseline.
  // MID_RATIO: distance from the text's vertical centre down to the baseline.
  var TOP_RATIO=0.8, MID_RATIO=0.35;

  function relLum(hex){ var c=[0,1,2].map(function(i){ var v=parseInt(hex.substr(1+i*2,2),16)/255; return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4); }); return 0.2126*c[0]+0.7152*c[1]+0.0722*c[2]; }
  function contrastRatio(hexA,hexB){ var la=relLum(hexA), lb=relLum(hexB); var hi=Math.max(la,lb), lo=Math.min(la,lb); return (hi+0.05)/(lo+0.05); }
  function isValidHex(h){ return /^#[0-9a-fA-F]{6}$/.test(h); }
  // Accepts #RGB or #RRGGBB (with or without the leading #); returns normalized #RRGGBB or null.
  function normalizeHex(h){
    h=h.trim(); if(h[0]!=='#') h='#'+h;
    if(/^#[0-9a-fA-F]{3}$/.test(h)) h='#'+h[1]+h[1]+h[2]+h[2]+h[3]+h[3];
    return isValidHex(h)?h:null;
  }
  // Contrast is checked between the code color and the effective background:
  // the chosen background color, or white when transparent (the most common
  // surface a transparent code ends up on).
  function updateColorHint(){
    var effBg=transparentEl.checked?'#FFFFFF':BG;
    var contrast=contrastRatio(FG,effBg);
    if(contrast<3){
      colorHint.textContent=transparentEl.checked
        ?'Low contrast against light backgrounds — may not scan.'
        :'Too little contrast with the background — may not scan.';
      colorHint.className='hint2 warn';
    } else {
      colorHint.textContent='Dark codes on light backgrounds scan most reliably.';
      colorHint.className='hint2';
    }
  }

  function setDownloadEnabled(on){ dlEl.disabled=!on; svgEl.disabled=!on; }

  function layoutLabel(labelText){
    // Fixed cushion (25% of the band) so the label size depends only on the
    // chosen output size, not on the QR version of the encoded text.
    var labelH=BAND[SIZE];
    var cushion=Math.round(labelH*0.25);
    var fontSize=labelH-cushion;
    ctx.font='600 '+fontSize+'px '+FONT;
    var availW=SIZE-2*cushion, disp=labelText;
    if(ctx.measureText(disp).width>availW){
      while(disp.length>1 && ctx.measureText(disp+'\u2026').width>availW){ disp=disp.slice(0,-1); }
      disp=disp.replace(/\s+$/,'')+'\u2026';
    }
    return {disp:disp, fontSize:fontSize, labelH:labelH};
  }

  function escapeXml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

  function buildSVG(){
    if(MODE==='barcode') return buildBarcodeSVG();
    if(!lastMatrix) return null;
    var labelText=labelEl.value.trim(), hasLabel=labelText.length>0;
    var mods=lastMatrix.size, scale=SIZE/(mods+QUIET*2);
    var lay=hasLabel?layoutLabel(labelText):null;
    var labelH=hasLabel?lay.labelH:0, W=SIZE, H=SIZE+labelH;
    var out='<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">';
    if(!transparentEl.checked) out+='<rect width="'+W+'" height="'+H+'" fill="'+BG+'"/>';
    var d='';
    for(var y=0;y<mods;y++) for(var x=0;x<mods;x++){ if(lastMatrix.m[y][x]){ var x0=Math.round((x+QUIET)*scale), x1=Math.round((x+QUIET+1)*scale), y0=Math.round((y+QUIET)*scale), y1=Math.round((y+QUIET+1)*scale); d+='M'+x0+' '+y0+'H'+x1+'V'+y1+'H'+x0+'Z'; } }
    out+='<path d="'+d+'" fill="'+FG+'" shape-rendering="crispEdges"/>';
    // Baseline-anchored y position (default alphabetic baseline) instead of
    // dominant-baseline, for compatibility with non-browser SVG renderers.
    if(hasLabel){
      var textY=SIZE+Math.round(lay.fontSize*TOP_RATIO);
      out+='<text x="'+(W/2)+'" y="'+textY+'" text-anchor="middle" font-family="-apple-system,Helvetica,Arial,sans-serif" font-weight="600" font-size="'+lay.fontSize+'" fill="'+FG+'">'+escapeXml(lay.disp)+'</text>';
    }
    out+='</svg>';
    return out;
  }

  /* ---------- Code 128 barcode ---------- */
  var C128=["212222","222122","222221","121223","121322","131222","122213","122312","132212","221213","221312","231212","112232","122132","122231","113222","123122","123221","223211","221132","221231","213212","223112","312131","311222","321122","321221","312212","322112","322211","212123","212321","232121","111323","131123","131321","112313","132113","132311","211313","231113","231311","112133","112331","132131","113123","113321","133121","313121","211331","231131","213113","213311","213131","311123","311321","331121","312113","312311","332111","314111","221411","431111","111224","111422","121124","121421","141122","141221","112214","112412","122114","122411","142112","142211","241211","221114","413111","241112","134111","111242","121142","121241","114212","124112","124211","411212","421112","421211","212141","214121","412121","111143","111341","131141","114113","114311","411113","411311","113141","114131","311141","411131","211412","211214","211232","2331112"];
  function sanitize128(s){ var o=''; for(var i=0;i<s.length;i++){ var c=s.charCodeAt(i); if(c>=32&&c<=126) o+=s.charAt(i); } return o; }
  function encode128B(text){
    var codes=[104];
    for(var i=0;i<text.length;i++) codes.push(text.charCodeAt(i)-32);
    var sum=104; for(var i=1;i<codes.length;i++) sum+=codes[i]*i;
    codes.push(sum%103); codes.push(106);
    var mods='';
    for(var i=0;i<codes.length;i++){ var p=C128[codes[i]], bar=true; for(var j=0;j<p.length;j++){ var w=parseInt(p.charAt(j),10); for(var k=0;k<w;k++) mods+=(bar?'1':'0'); bar=!bar; } }
    return mods;
  }
  function buildBarcodeModel(){
    var text=sanitize128(urlEl.value); if(!text) return null;
    var mods=encode128B(text);
    var q=BQUIET, mw=BMODW;
    var W=(mods.length+q*2)*mw, barH=BHEIGHT, H=barH+BTEXT;
    var fs=Math.round(barH*0.24); ctx.font='600 '+fs+'px '+FONT;
    var avail=W-2*q*mw;
    while(fs>8 && ctx.measureText(text).width>avail){ fs--; ctx.font='600 '+fs+'px '+FONT; }
    return {text:text, mods:mods, q:q, mw:mw, W:W, H:H, barH:barH, fs:fs};
  }
  function fillCanvasBg(){ if(transparentEl.checked){ ctx.clearRect(0,0,cv.width,cv.height); frameEl.style.backgroundColor=''; } else { ctx.fillStyle=BG; ctx.fillRect(0,0,cv.width,cv.height); frameEl.style.backgroundColor=BG; } }
  function renderBarcode(){
    var m=lastBarcode;
    if(!m){ cv.width=600; cv.height=BHEIGHT+BTEXT; fillCanvasBg(); dimEl.textContent=cv.width+' \u00d7 '+cv.height+' px'; return; }
    cv.width=m.W; cv.height=m.H; fillCanvasBg();
    ctx.fillStyle=FG; var x=m.q*m.mw;
    for(var i=0;i<m.mods.length;i++){ if(m.mods.charAt(i)==='1') ctx.fillRect(x,0,m.mw,m.barH); x+=m.mw; }
    // Caption anchored by its alphabetic baseline (matches the SVG output exactly).
    var capY=m.barH+(m.H-m.barH)/2+Math.round(m.fs*MID_RATIO);
    ctx.fillStyle=FG; ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.font='600 '+m.fs+'px '+FONT;
    ctx.fillText(m.text, m.W/2, capY);
    dimEl.textContent=m.W+' \u00d7 '+m.H+' px';
  }
  function buildBarcodeSVG(){
    var m=lastBarcode; if(!m) return null;
    var out='<svg xmlns="http://www.w3.org/2000/svg" width="'+m.W+'" height="'+m.H+'" viewBox="0 0 '+m.W+' '+m.H+'">';
    if(!transparentEl.checked) out+='<rect width="'+m.W+'" height="'+m.H+'" fill="'+BG+'"/>';
    var x=m.q*m.mw, i=0;
    while(i<m.mods.length){ if(m.mods.charAt(i)==='1'){ var run=0; while(i<m.mods.length && m.mods.charAt(i)==='1'){ run++; i++; } out+='<rect x="'+x+'" y="0" width="'+(run*m.mw)+'" height="'+m.barH+'" fill="'+FG+'"/>'; x+=run*m.mw; } else { x+=m.mw; i++; } }
    // Baseline-anchored caption (no dominant-baseline) for renderer compatibility.
    var capY=m.barH+(m.H-m.barH)/2+Math.round(m.fs*MID_RATIO);
    out+='<text x="'+(m.W/2)+'" y="'+capY+'" text-anchor="middle" font-family="-apple-system,Helvetica,Arial,sans-serif" font-weight="600" font-size="'+m.fs+'" fill="'+FG+'">'+escapeXml(m.text)+'</text>';
    out+='</svg>'; return out;
  }
  // showEmptyErr: true when triggered by the Generate button / Enter key, so an
  // empty or fully-stripped input explains itself; false while typing, so the
  // message doesn't flash on every keystroke.
  function runBarcode(showEmptyErr){
    errEl.textContent=''; lastMatrix=null;
    var raw=urlEl.value;
    lastBarcode=buildBarcodeModel();
    if(!lastBarcode && showEmptyErr){
      errEl.textContent=raw.trim().length===0
        ?'Enter text for the barcode first.'
        :'No encodable characters \u2014 use letters, digits and common symbols.';
    }
    render(); setDownloadEnabled(!!lastBarcode);
  }

  function render(){
    if(MODE==='barcode'){ renderBarcode(); return; }
    var labelText=labelEl.value.trim();
    var hasLabel=labelText.length>0;
    var labelH=hasLabel?BAND[SIZE]:0;
    cv.width=SIZE; cv.height=SIZE+labelH;
    fillCanvasBg();
    dimEl.textContent=SIZE+' × '+(SIZE+labelH)+' px';
    var mods=lastMatrix?lastMatrix.size:21;
    var scale=SIZE/(mods+QUIET*2);
    // QR modules (top SIZE x SIZE region, includes a QUIET-module quiet zone)
    if(lastMatrix){
      ctx.fillStyle=FG;
      for(var y=0;y<lastMatrix.size;y++) for(var x=0;x<lastMatrix.size;x++){ if(lastMatrix.m[y][x]){ var x0=Math.round((x+QUIET)*scale), x1=Math.round((x+QUIET+1)*scale); var y0=Math.round((y+QUIET)*scale), y1=Math.round((y+QUIET+1)*scale); ctx.fillRect(x0,y0,x1-x0,y1-y0); } }
    }
    // label: single line inside the extension band, sized from the band alone
    // (fixed 25% cushion), horizontally centred, anchored by its alphabetic
    // baseline to match the SVG output exactly; overflow is truncated.
    if(hasLabel){
      var lay=layoutLabel(labelText);
      ctx.fillStyle=FG; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      ctx.font='600 '+lay.fontSize+'px '+FONT;
      ctx.fillText(lay.disp, SIZE/2, SIZE+Math.round(lay.fontSize*TOP_RATIO));
    }
  }

  function run(){ errEl.textContent=''; if(MODE==='barcode'){ runBarcode(true); return; } var t=urlEl.value.trim(); if(!t){ errEl.textContent='Please paste a URL first.'; lastMatrix=null; setDownloadEnabled(false); render(); return; } try{ lastMatrix=generate(t); render(); setDownloadEnabled(true); }catch(e){ errEl.textContent=e.message||String(e); lastMatrix=null; setDownloadEnabled(false); render(); } }

  document.getElementById('gen').addEventListener('click',run);
  urlEl.addEventListener('keydown',function(e){ if(e.key==='Enter') run(); });
  // Live sanitize + regenerate while typing in barcode mode. The cursor is
  // restored by the number of characters actually stripped, so multi-character
  // pastes containing invalid characters keep the caret in the right place.
  urlEl.addEventListener('input',function(){
    if(MODE!=='barcode') return;
    var orig=urlEl.value, s=sanitize128(orig);
    if(s!==orig){
      var p=urlEl.selectionStart, removed=orig.length-s.length;
      urlEl.value=s;
      var np=Math.max(0,p-removed);
      try{ urlEl.setSelectionRange(np,np); }catch(e){}
    }
    runBarcode(false);
  });
  modeSeg.addEventListener('click',function(e){ var b=e.target.closest('button'); if(!b) return; MODE=b.getAttribute('data-mode'); Array.prototype.forEach.call(modeSeg.children,function(x){ x.classList.toggle('active',x===b); }); document.body.classList.toggle('barcode',MODE==='barcode'); errEl.textContent=''; if(MODE==='barcode'){ urlLabel.textContent='Barcode data'; urlEl.placeholder='e.g. ABC-1234'; var s=sanitize128(urlEl.value); if(s!==urlEl.value) urlEl.value=s; } else { urlLabel.textContent='URL or text'; urlEl.placeholder='https://example.com'; } lastMatrix=null; lastBarcode=null; setDownloadEnabled(false); if(urlEl.value.trim()) run(); else render(); });

  sizeSeg.addEventListener('click',function(e){ var btn=e.target.closest('button'); if(!btn) return; SIZE=parseInt(btn.getAttribute('data-size'),10); Array.prototype.forEach.call(sizeSeg.children,function(b){ b.classList.toggle('active',b===btn); }); render(); });

  function setColor(hex){ FG=hex; colorEl.value=hex; colorHex.value=hex.toUpperCase(); updateColorHint(); render(); }
  colorEl.addEventListener('input',function(){ setColor(colorEl.value); });
  // Live update on a full 6-digit value; shorthand #RGB is expanded on change/blur
  // so typing isn't interrupted mid-entry.
  colorHex.addEventListener('input',function(){ var h=colorHex.value.trim(); if(h[0]!=='#') h='#'+h; if(isValidHex(h)){ setColor(h); } });
  colorHex.addEventListener('change',function(){ var h=normalizeHex(colorHex.value); if(h){ setColor(h); } else { colorHex.value=FG.toUpperCase(); } });
  labelEl.addEventListener('input',render);
  function setBg(hex){ BG=hex; bgColorEl.value=hex; bgHex.value=hex.toUpperCase(); updateColorHint(); render(); }
  bgColorEl.addEventListener('input',function(){ setBg(bgColorEl.value); });
  bgHex.addEventListener('input',function(){ var h=bgHex.value.trim(); if(h[0]!=='#') h='#'+h; if(isValidHex(h)){ setBg(h); } });
  bgHex.addEventListener('change',function(){ var h=normalizeHex(bgHex.value); if(h){ setBg(h); } else { bgHex.value=BG.toUpperCase(); } });
  transparentEl.addEventListener('change',function(){ var t=transparentEl.checked; frameEl.classList.toggle('transparent',t); bgColorEl.disabled=t; bgHex.disabled=t; updateColorHint(); render(); });

  function baseName(){ return MODE==='barcode' ? 'barcode' : ('qr-code-'+SIZE); }
  dlEl.addEventListener('click',function(){ var a=document.createElement('a'); a.download=baseName()+'.png'; a.href=cv.toDataURL('image/png'); a.click(); });
  svgEl.addEventListener('click',function(){ var svg=buildSVG(); if(!svg) return; var blob=new Blob([svg],{type:'image/svg+xml;charset=utf-8'}); var u=URL.createObjectURL(blob); var a=document.createElement('a'); a.download=baseName()+'.svg'; a.href=u; a.click(); setTimeout(function(){ URL.revokeObjectURL(u); },1000); });
  clearEl.addEventListener('click',function(){ urlEl.value=''; labelEl.value=''; errEl.textContent=''; transparentEl.checked=false; frameEl.classList.remove('transparent'); bgColorEl.disabled=false; bgHex.disabled=false; SIZE=500; Array.prototype.forEach.call(sizeSeg.children,function(b){ b.classList.toggle('active',b.getAttribute('data-size')==='500'); }); setColor('#000000'); setBg('#FFFFFF'); lastMatrix=null; lastBarcode=null; setDownloadEnabled(false); render(); urlEl.focus(); });

  updateColorHint(); render();
})();
</script>
</body>
</html>
